version: 2
sources:
  - name: procurement_sources
    description: List of all PROCUREMENT source tables from bronze layer
    database: |
      {%- if  target.name == "dev" -%} DEV_PROCUREMENT_WAREHOUSE
      {%- elif target.name == "qa"  -%} QA_PROCUREMENT_WAREHOUSE
      {%- elif target.name == "uat"  -%} PROD_PROCUREMENT_WAREHOUSE
      {%- elif target.name == "prod"  -%}  PROD_PROCUREMENT_WAREHOUSE
      {%- else -%} invalid_database
      {%- endif -%}
    schema: BRONZE
    tables:
      - name: BUSINESS_PROCESS_TRANSACTIONS_OF_TYPE_AWAITING_ACTION
        description: Table has business process transactions awaiting action
      - name: CUSTOMIZED_PURCHASE_ORDERS
        description: Table has purchase order data with customizations
      - name: EXPENSE_REPORTS
        description: Table has employee expense report data
      - name: EXTRACT_SUPPLIERS
        description: Table has supplier master data
      - name: INPROGRESS_REQUISITIONS_OPENED_BY_TERMINATED_WORKERS
        description: Table has requisitions opened by terminated workers
      - name: INVOICE_BALANCE_REMAINING_10_PCTG
        description: Table has invoices with remaining balance over 10%
      - name: INVOICE_MATCH_EXCEPTIONS
        description: Table has invoice matching exceptions
      - name: RECEIPT_WITH_REQUISITIONER
        description: Table has receipt data with requisitioner information
      - name: REQUISITIONS_BY_COMPANY
        description: Table has requisition data by company
      - name: SETTLEMENT_RUNS
        description: Table has payment settlement run data
      - name: SUPPLIER_INVOICES
        description: Table has supplier invoice data
      - name: SUPPLIER_PAYMENTS
        description: Table has supplier payment data
      - name: ZELIS_PAID_SUPPLIER_INVOICES
        description: Table has Zelis paid supplier invoice data