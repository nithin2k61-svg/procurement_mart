version: 2
sources:
  - name: metric_mart_sources 
    description: List of all KPIS source tables For PVM datamart
    database: |
      {%- if  target.name == "dev" -%} DEV_FINANCE_WAREHOUSE 
      {%- elif target.name == "qa"  -%} QA_FINANCE_WAREHOUSE
      {%- elif target.name == "uat"  -%} UAT_FINANCE_WAREHOUSE
      {%- elif target.name == "prod"  -%} PROD_FINANCE_WAREHOUSE
      {%- else -%} 
      {%- endif -%}
    schema: SOURCE
    tables:
      - name: SRC_METRICS
        description: Table has the Docs SRC_METRICS data
      - name: SRC_METRIC_CATEGORY
        description: Table has the Docs SRC_METRIC_CATEGORY data
      - name: SRC_METRICS_KPI
        description: Table has the Docs SRC_METRIC_KPI_OVERRIDES data    

  - name: adptive_sources
    description: List of all adptive tables For Consolidated Mart
    database: |
      {%- if  target.name == "dev" -%} DEV_DATALAKE
      {%- elif target.name == "qa"  -%} QA_DATALAKE
      {%- elif target.name == "uat"  -%} PROD_DATALAKE
      {%- elif target.name == "prod"  -%} PROD_DATALAKE
      {%- else -%} invalid_database
      {%- endif -%}
    schema: ADAPTIVE
    tables:
      - name: LRP_REVENUE
        description: Table has the LRP_REVENUE data
