version: 2
sources:
  - name: adaptive_comm_sources
    description: List of all PPS source tables
    database:  |
      {%- if  target.name == "dev" -%} DEV_DATALAKE
      {%- elif target.name == "qa"  -%} QA_DATALAKE
      {%- elif target.name == "uat"  -%} PROD_DATALAKE
      {%- elif target.name == "prod"  -%}  PROD_DATALAKE
      {%- else -%} invalid_database
      {%- endif -%} 
    schema: ADAPTIVE
    tables:
      - name: actuals
        description: Table has the actuals information
      - name: dimensions
        description: Table has the dimensions information
      - name: realization_rates
        description: Table has realization rate data 
      - name: HIERARCHY_ATTRIBUTES
        description: Table has the product_hierarchy_attributes information   
      - name: client_salesforceid_mapping
        description: Table has the product_hierarchy_attributes information   
      - name: client_financeparent_mapping
        description: Table has the client names information        
      - name:  actuals_opex
        description: Table has the actuals information like account_name, business_unit, product etc.
      - name:  actuals_crev
        description: Table has the actuals information like account_name, business_unit, product etc.        
      - name: plan_opex             
        description: Table has the revenue information
      - name: forecast_opex
        description: Table has the actuals information like account_name, business_unit, product etc..
      - name: plan_crev             
        description: Table has the revenue information
      - name: forecast_crev
        description: Table has the actuals information like account_name, business_unit, product etc..        
      - name: ACTUALS_HEADCOUNT
        description: Table has the actuals information like account_name, business_unit, product etc..  
      - name: PLAN_HEADCOUNT
        description: Table has the actuals information like account_name, business_unit, product etc..
      - name: FORECAST_HEADCOUNT
        description: Table has the actuals information like account_name, business_unit, product etc..   
      - name: plan_rev             
        description: Table has the revenue information
      - name: forecast_rev
        description: Table has the actuals information like account_name, business_unit, product etc..  
      - name: exchrates
        description: Table has the actuals exchange rate information like account_name, account_code, rollup values etc..
      - name: business_unit
        description: Table has the business_unit information
      - name: BOOKING_WORKDAY_PRODUCT_MAPPING
        description: Table has the BOOKING_WORKDAY_PRODUCT_MAPPING information
      - name: product
        description: Table has the product information
      - name: LEVELS
        description: Table has the various levels information 
      - name: ACCOUNTS
        description: Table has the various accounts information

  - name: adaptive_model_sources
    description: List of all PPS source tables
    database:  |
      {%- if  target.name == "dev" -%} DEV_ADS_REPORTING
      {%- elif target.name == "qa"  -%} QA_ADS_REPORTING
      {%- elif target.name == "uat"  -%} UAT_ADS_REPORTING
      {%- elif target.name == "prod"  -%}  PROD_ADS_REPORTING
      {%- else -%} invalid_database
      {%- endif -%} 
    schema: MODEL
    tables:
      - name: FACTOPPORTUNITY
        description: Table has the FACTOPPORTUNITY information
      - name: FACTOPPORTUNITYDETAIL
        description: Table has the FACTOPPORTUNITYDETAIL information 
      - name: DIMPROPOSEDSERVICES
        description: Table has the DIMPROPOSEDSERVICES information
      - name: DIMACCOUNTS
        description: Table has the DIMACCOUNTS information
      - name: DIMUSER
        description: Table has the DIMUSER information 