version: 2
sources:
  - name: ch_reference_sources
    description: List of all CH Reference tables For Consolidated Mart
    database: |
      {%- if  target.name == "dev" -%} DEV_DATALAKE
      {%- elif target.name == "qa"  -%} QA_DATALAKE
      {%- elif target.name == "uat"  -%} PROD_DATALAKE
      {%- elif target.name == "prod"  -%} PROD_DATALAKE
      {%- else -%} invalid_database
      {%- endif -%}
    schema: CH_REFERENCES
    tables:
      - name: CHD_RAW_DCS_DATA
        description: Table has the RAW Docs data
      - name: CH_MONTHLY_BUDGET
        description: Table has the monthly budget data        
      - name: ACCOUNT_PAYER_MAPPING
        description: Table has the account payer mapping data
      - name: docs_clientname_override
        description: Docs Client Name Override   