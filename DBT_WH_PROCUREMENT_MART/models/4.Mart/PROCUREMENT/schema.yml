version: 2

models:
  - name: dim_supplier
    description: Mart supplier dimension table with SCD Type 2 support
    columns:
      - name: dim_supplier_id
        description: Unique supplier dimension identifier
        tests:
          - not_null
          - unique
      - name: SUPPLIER_CODE
        description: Supplier code from source system
        tests:
          - not_null
      - name: SUPPLIER_NAME
        description: Supplier name
        tests:
          - not_null
      - name: src_uniq_cd
        description: Source unique code
        tests:
          - not_null
          - unique

